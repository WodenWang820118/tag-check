name: Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Branch, tag, or commit to check out before evaluating the desktop release
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.release_gate.outputs.checkout_ref }}
      release_tag: ${{ steps.release_context.outputs.release_tag }}
      release_version: ${{ steps.release_context.outputs.release_version }}
      should_release: ${{ steps.release_gate.outputs.should_release }}
      skip_reason: ${{ steps.release_gate.outputs.skip_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.sha || inputs.checkout_ref || github.sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Describe release context
        id: release_context
        run: |
          node tools/scripts/tauri/release/release.ts describe
          node --input-type=module -e "
          import { appendFile } from 'node:fs/promises';
          import { execFileSync } from 'node:child_process';

          const outputPath = process.env.GITHUB_OUTPUT;
          if (!outputPath) {
            throw new Error('GITHUB_OUTPUT is not available.');
          }

          const checkoutRef = execFileSync('git', ['rev-parse', 'HEAD'], {
            encoding: 'utf8'
          }).trim();

          await appendFile(outputPath, \`checkout_ref=\${checkoutRef}\n\`, 'utf8');
          console.log(JSON.stringify({ checkoutRef }, null, 2));
          "
      - name: Validate release notes exist
        run: |
          node --input-type=module -e "
          import { existsSync } from 'node:fs';
          import { join } from 'node:path';

          const releaseVersion = process.env.RELEASE_VERSION;
          if (!releaseVersion) {
            throw new Error('RELEASE_VERSION is required.');
          }

          const notesPath = join(
            process.cwd(),
            'docs',
            'releases',
            \`\${releaseVersion}.md\`
          );

          if (!existsSync(notesPath)) {
            throw new Error(\`Missing \${notesPath}.\`);
          }

          console.log(\`Verified release notes at \${notesPath}.\`);
          "
        env:
          RELEASE_VERSION: ${{ steps.release_context.outputs.release_version }}
      - name: Resolve release gate
        id: release_gate
        uses: actions/github-script@v7
        env:
          CHECKOUT_REF: ${{ steps.release_context.outputs.checkout_ref }}
          RELEASE_TAG: ${{ steps.release_context.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_context.outputs.release_version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const checkoutRef = process.env.CHECKOUT_REF?.trim();
            const releaseTag = process.env.RELEASE_TAG?.trim();
            const releaseVersion = process.env.RELEASE_VERSION?.trim();

            if (!checkoutRef || !releaseTag || !releaseVersion) {
              throw new Error('CHECKOUT_REF, RELEASE_TAG, and RELEASE_VERSION are required.');
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const legacyTag = releaseVersion;
            const tagRefPath = (tag) => `tags/${tag}`;
            const fullTagRef = (tag) => `refs/${tagRefPath(tag)}`;

            const getReleaseByTag = async (tag) => {
              try {
                return await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag
                });
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }

                throw error;
              }
            };

            const getTagSha = async (tag) => {
              try {
                const response = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: tagRefPath(tag)
                });

                if (response.data.object.type === 'tag') {
                  const annotatedTag = await github.rest.git.getTag({
                    owner,
                    repo,
                    tag_sha: response.data.object.sha
                  });

                  return annotatedTag.data.object.sha;
                }

                return response.data.object.sha;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }

                throw error;
              }
            };

            const releaseCandidates = [
              { kind: 'release', tag: releaseTag, value: await getReleaseByTag(releaseTag) },
              { kind: 'release', tag: legacyTag, value: await getReleaseByTag(legacyTag) }
            ].filter((candidate) => candidate.value);

            if (releaseCandidates.length > 0) {
              const existing = releaseCandidates[0];
              const skipReason = `Release already exists for ${existing.tag}; skipping duplicate draft creation.`;
              core.setOutput('should_release', 'false');
              core.setOutput('skip_reason', skipReason);
              core.notice(skipReason);
              return;
            }

            const canonicalTagSha = await getTagSha(releaseTag);
            const legacyTagSha = await getTagSha(legacyTag);

            if (canonicalTagSha === checkoutRef) {
              core.notice(`Reusing existing ${releaseTag} at ${checkoutRef}.`);
            } else if (canonicalTagSha) {
              await github.rest.git.updateRef({
                owner,
                repo,
                ref: tagRefPath(releaseTag),
                sha: checkoutRef,
                force: true
              });
              core.warning(
                `Updated unreleased tag ${releaseTag} from ${canonicalTagSha} to ${checkoutRef} so the draft release builds the workflow trigger commit. If you fetched the old tag locally, run git fetch --tags --force.`
              );
            } else {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: fullTagRef(releaseTag),
                sha: checkoutRef
              });
              core.notice(`Created canonical tag ${releaseTag} at ${checkoutRef}.`);
            }

            if (legacyTagSha) {
              core.notice(
                `Legacy tag ${legacyTag} already exists at ${legacyTagSha}; leaving it unchanged.`
              );
            }

            core.setOutput('checkout_ref', checkoutRef);
            core.setOutput('should_release', 'true');
            core.setOutput('skip_reason', '');
      - name: Report skipped release
        if: ${{ steps.release_gate.outputs.should_release != 'true' }}
        run: echo "${{ steps.release_gate.outputs.skip_reason }}"

  build-desktop:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.should_release == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            nx_target: desktop-tauri:bundle-windows
          - platform: macos
            runner: macos-latest
            nx_target: desktop-tauri:bundle-macos
          - platform: linux
            runner: ubuntu-latest
            nx_target: desktop-tauri:bundle-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev librsvg2-bin patchelf
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Describe release context
        id: release_context
        run: node tools/scripts/tauri/release/release.ts describe --platform ${{ matrix.platform }} --release-tag ${{ needs.prepare-release.outputs.release_tag }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build Tauri desktop bundle
        run: pnpm nx run ${{ matrix.nx_target }}
      - name: Validate assembled release artifact
        run: node tools/scripts/tauri/release/release.ts validate-artifact --platform ${{ matrix.platform }} --release-tag ${{ needs.prepare-release.outputs.release_tag }}
      - name: Upload Tauri bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_context.outputs.artifact_name }}
          path: dist/release-assets/${{ matrix.platform }}
          if-no-files-found: error

  publish-release:
    needs:
      - prepare-release
      - build-desktop
    if: ${{ needs.prepare-release.outputs.should_release == 'true' && success() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Describe release context
        id: release_context
        run: node tools/scripts/tauri/release/release.ts describe --release-tag ${{ needs.prepare-release.outputs.release_tag }}
      - name: Download desktop release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/downloaded-release-assets
          pattern: tag-check-desktop-v${{ steps.release_context.outputs.release_version }}-*
      - name: Assemble release payload
        run: node tools/scripts/tauri/release/release.ts assemble --release-tag ${{ needs.prepare-release.outputs.release_tag }} --artifacts-root dist/downloaded-release-assets --output-dir dist/publish-release
      - name: Validate checksum manifest
        run: |
          node --input-type=module -e "
          import { existsSync } from 'node:fs';
          import { join } from 'node:path';

          const checksumPath = join(
            process.cwd(),
            'dist',
            'publish-release',
            'SHA256SUMS.txt'
          );

          if (!existsSync(checksumPath)) {
            throw new Error(\`Missing \${checksumPath}.\`);
          }

          console.log(\`Verified checksum manifest at \${checksumPath}.\`);
          "
      - name: Publish draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ steps.release_context.outputs.release_version }}.md
          draft: true
          fail_on_unmatched_files: true
          files: dist/publish-release/*
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
