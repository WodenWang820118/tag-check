<main
  class="main-page mx-auto w-full max-w-[1440px] px-4 sm:px-6 lg:px-10 pt-0 pb-12"
>
  <header class="main-page__title text-left my-4 sm:my-6 lg:my-8">
    <mat-tab-group
      mat-stretch-tabs="false"
      mat-align-tabs="start"
      [(selectedIndex)]="selectedIndex"
    >
      <mat-tab label="Tag Build"> </mat-tab>
      <mat-tab label="Tag Extract (In Development)" disabled> </mat-tab>
    </mat-tab-group>
  </header>

  <section
    class="main-page__board grid gap-6 lg:gap-8 mb-12 w-full grid-cols-1 xl:[grid-template-columns:minmax(0,1fr)_clamp(18rem,22%,24rem)_minmax(0,1fr)] xl:[grid-template-areas:'input_actions_output']"
    aria-label="Tag Build workspace"
  >
    <!-- Left: Input Editor Panel -->
    <div
      class="main-page__board__item main-page__editor min-w-0 w-full border border-gray-300 dark:border-gray-700 rounded-md bg-white/60 dark:bg-transparent shadow-sm xl:[grid-area:input]"
      aria-label="Input JSON editor"
    >
      <div
        class="px-4 py-2 border-b border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-200"
      >
        Input JSON
      </div>
      <div class="p-2">
        <!-- If using Tag Extract (selectedIndex === TagBuildMode.TagExtract) input should be blank -->
        @if (selectedIndex === TagBuildMode.TagBuild) {
          @if (specs().length > 0) {
            <lib-editor
              [content]="specs() | json"
              [editorExtension]="inputExtension"
            >
            </lib-editor>
          } @else {
            <lib-editor
              [content]="[] | json"
              [editorExtension]="inputExtension"
            ></lib-editor>
          }
        } @else {
          <lib-editor
            [content]="[] | json"
            [editorExtension]="inputExtension"
          ></lib-editor>
        }
      </div>
    </div>

    <!-- Middle: Actions Panel -->
    <div class="main-page__board__item min-w-0 w-full xl:[grid-area:actions]">
      <lib-functional-card class="h-full w-full">
        <lib-upload-action
          class="functional-card__actions__item"
          (uploadClick)="onUpload()"
        ></lib-upload-action>
      </lib-functional-card>
    </div>

    <!-- Right: Output Editor Panel -->
    <div
      class="main-page__board__item main-page__editor min-w-0 w-full border border-gray-300 dark:border-gray-700 rounded-md bg-white/60 dark:bg-transparent shadow-sm xl:[grid-area:output]"
      aria-label="Output JSON editor"
    >
      <div
        class="px-4 py-2 border-b border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-200"
      >
        Output JSON
      </div>
      <div class="p-2">
        <lib-editor [editorExtension]="outputExtension"></lib-editor>
      </div>
    </div>
  </section>
</main>
