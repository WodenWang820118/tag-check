<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting</title>
    <meta name="robots" content="noindex,follow" />
    <link
      rel="canonical"
      href="https://ng-gtm-integration-sample.vercel.app/product/details/san-francisco"
    />
    <meta
      http-equiv="refresh"
      content="0; url=/product/details/san-francisco"
    />
    <script>
      const target = '/product/details/san-francisco';
      window.location.replace(
        `${target}${window.location.search}${window.location.hash}`
      );
    </script>
  </head>
  <body>
    <pre>Redirecting to <a href="/product/details/san-francisco">/product/details/san-francisco</a></pre>
  </body>
</html>
