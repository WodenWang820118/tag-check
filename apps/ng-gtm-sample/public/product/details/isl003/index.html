<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting</title>
    <meta name="robots" content="noindex,follow" />
    <link
      rel="canonical"
      href="https://ng-gtm-sample.vercel.app/product/details/puerto-rico"
    />
    <meta http-equiv="refresh" content="0; url=/product/details/puerto-rico" />
    <script>
      const target = '/product/details/puerto-rico';
      window.location.replace(
        `${target}${window.location.search}${window.location.hash}`
      );
    </script>
  </head>
  <body>
    <pre>Redirecting to <a href="/product/details/puerto-rico">/product/details/puerto-rico</a></pre>
  </body>
</html>
