<section class="sample-panel overflow-hidden" [ngClass]="cardClass">
  @if (!hidHeader) {
    <div
      class="border-b border-slate-200/80 px-6 py-4"
      [ngClass]="headerClass"
    >
      <div class="flex items-center justify-between gap-3">
        <h3 class="text-lg font-semibold text-slate-950">{{ cardTitle }}</h3>
        <ng-content select=".app-card-header"></ng-content>
      </div>
    </div>
  }

  <div class="px-6 py-6" [ngClass]="blockClass">
    <ng-content></ng-content>
  </div>
</section>
