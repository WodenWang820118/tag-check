<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tag Check</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: linear-gradient(
          135deg,
          #1a237e 0%,
          #283593 50%,
          #3949ab 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          sans-serif;
        user-select: none;
        overflow: hidden;
      }
      .app-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 300;
      }
      .app-name {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 36px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .status {
        margin-top: 28px;
        font-size: 13px;
        opacity: 0.65;
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.45;
        }
        50% {
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-icon">&#10003;</div>
    <div class="app-name">Tag Check</div>
    <div class="spinner"></div>
    <div class="status">Loading&#8230;</div>
  </body>
</html>
